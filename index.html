<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta Invest | Inteligência em Crédito</title>
    <meta
      name="description"
      content="Sistema premium para consultas de crédito Boa Vista e Serasa"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/styles.css" />

    <script src="https://mzanalytics.vercel.app/tracker.js"></script>
  </head>
  <body>
    <div class="background-elements">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <!-- Onboarding Modal -->
    <div id="onboarding-modal" class="modal-overlay hidden">
      <div class="glass-card onboarding-card">
        <div id="onboarding-step-1">
          <h2>Seu nome é Marcelo Pires?</h2>
          <div class="onboarding-actions">
            <button id="btn-marcelo-sim" class="btn-primary">Sim</button>
            <button id="btn-marcelo-nao" class="btn-secondary">Não</button>
          </div>
        </div>
        <div id="onboarding-step-2" class="hidden">
          <h2>Você é gay?</h2>
          <div class="onboarding-actions">
            <button id="btn-gay-sim" class="btn-primary">Sim</button>
            <button id="btn-gay-nao" class="btn-secondary">Não</button>
          </div>
          <p id="gay-error" class="error-msg" style="text-align: center; margin-top: 1rem;"></p>
        </div>
      </div>
    </div>

    <!-- Login View -->
    <div id="login-view" class="view-container active">
      <div class="glass-card login-card">
        <div class="logo-container">
          <i class="fa-solid fa-chart-line logo-icon"></i>
          <h1>Consulta Invest</h1>
        </div>
        <p class="subtitle">Acesso Restrito</p>
        <form id="login-form">
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Usuário" required />
          </div>
          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Senha" required />
          </div>
          <button type="submit" class="btn-primary" id="login-btn">
            <span>Entrar</span>
            <div class="spinner hidden"></div>
          </button>
          <p id="login-error" class="error-msg"></p>
        </form>
      </div>
      <!-- Mock Ad Space -->
      <div class="mock-ad-container" data-ad-format="box" style="margin-top: 2rem;"></div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view-container hidden">
      <nav class="navbar glass-nav">
        <div class="logo-container">
          <i class="fa-solid fa-chart-line logo-icon"></i>
          <h2>Consulta Invest</h2>
        </div>
        <div class="user-profile">
          <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
          <span>Admin</span>
        </div>
      </nav>

      <main class="dashboard-content">
        <!-- Mock Ad Space Horizontal -->
        <div class="mock-ad-container" data-ad-format="horizontal" style="margin-bottom: 2rem; width: 100%;"></div>
        
        <div class="glass-card query-card">
          <div class="card-header">
            <h3>Nova Consulta de Crédito</h3>
            <p>
              Insira o CPF ou CNPJ para realizar a pesquisa nas bases de dados.
            </p>
          </div>
          <form id="query-form">
            <div class="form-row">
              <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input
                  type="text"
                  id="document"
                  placeholder="CPF / CNPJ (apenas números)"
                  required
                />
              </div>
              <div class="input-group select-group">
                <i class="fa-solid fa-database"></i>
                <select id="query-type" required>
                  <option value="" disabled selected>Selecione a Base</option>
                  <option value="scpc-boavista">Boa Vista SCPC</option>
                  <option value="serasa-premium">Serasa Premium</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="query-btn">
              <span>Consultar Agora</span>
              <div class="spinner hidden"></div>
            </button>
            <p id="query-error" class="error-msg"></p>
          </form>
        </div>

        <!-- Result Area -->
        <div id="result-container" class="glass-card result-card hidden">
          <div class="card-header result-header">
            <h3>Resultado da Consulta</h3>
            <button id="close-result" class="btn-icon">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div class="pdf-wrapper">
            <iframe id="pdf-viewer" src="" frameborder="0"></iframe>
          </div>
          <div class="action-bar">
            <a
              id="download-link"
              href="#"
              target="_blank"
              class="btn-secondary"
            >
              <i class="fa-solid fa-download"></i> Abrir PDF Externamente
            </a>
          </div>
        </div>
      </main>
    </div>

    <script src="/ads.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
